
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thina Store | High-Gloss Gaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            overflow-x: hidden;
        }

        .liquid-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }

        .blob-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: rgba(8, 145, 178, 0.2);
            filter: blur(120px);
            border-radius: 50%;
            animation: pulse 8s infinite alternate;
        }

        .blob-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: rgba(30, 58, 138, 0.3);
            filter: blur(120px);
            border-radius: 50%;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.1); opacity: 0.8; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            border-color: rgba(34, 211, 238, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .cart-sidebar {
            transform: translateX(100%);
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .cart-sidebar.active {
            transform: translateX(0);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .product-icon {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
        }
    </style>
</head>
<body>

    <!-- Liquid Mesh Background -->
    <div class="liquid-bg">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <!-- Header -->
    <nav class="sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between bg-white/5 backdrop-blur-2xl border border-white/10 rounded-2xl px-6 py-3 shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="relative flex items-center justify-center w-10 h-10 border border-white/20 rounded-lg">
                    <i class="fas fa-hexagon text-cyan-400"></i>
                    <span class="absolute text-[8px] font-black tracking-widest uppercase">TH</span>
                </div>
                <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">
                    THINA <span class="text-cyan-400">STORE</span>
                </h1>
            </div>

            <div class="hidden md:flex items-center gap-8 font-bold text-[11px] uppercase tracking-[0.2em] text-slate-400">
                <button class="hover:text-cyan-400 transition-colors text-cyan-400">All</button>
                <button class="hover:text-cyan-400 transition-colors">Automation</button>
                <button class="hover:text-cyan-400 transition-colors">Social</button>
                <button class="hover:text-cyan-400 transition-colors">Elite</button>
            </div>

            <button id="cartBtn" class="relative p-2.5 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all group">
                <i class="fas fa-shopping-bag text-slate-200 group-hover:scale-110"></i>
                <span id="cartCount" class="hidden absolute -top-1 -right-1 bg-white text-black text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-black shadow-lg">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative pt-16 pb-12 px-6 text-center max-w-4xl mx-auto">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/5 border border-white/10 text-[10px] font-black uppercase tracking-[0.3em] text-cyan-300 mb-8">
            <i class="fas fa-trending-up text-xs"></i>
            Top Rated Sri Lankan Provider
        </div>
        <h2 class="text-6xl md:text-8xl font-black mb-8 italic tracking-tighter leading-tight uppercase">
            THINA <br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-500">STORE</span>
        </h2>
        
        <div class="relative max-w-xl mx-auto mt-8">
            <div class="absolute -inset-1 bg-cyan-500/20 rounded-2xl blur-xl opacity-20"></div>
            <div class="relative flex items-center bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-1">
                <i class="fas fa-search ml-4 text-slate-500"></i>
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Find likes or squads..." 
                    class="w-full bg-transparent py-4 px-4 outline-none font-bold text-sm text-white placeholder:text-slate-600"
                >
            </div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="max-w-7xl mx-auto px-6 pb-40 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="productGrid">
        <!-- Products injected by JS -->
    </main>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-sidebar fixed inset-0 z-[100] flex justify-end">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="cartOverlay"></div>
        <div class="relative w-full max-w-lg bg-[#020617]/90 backdrop-blur-[60px] border-l border-white/10 h-full flex flex-col shadow-2xl">
            <div class="p-10 flex items-center justify-between border-b border-white/10">
                <h2 class="text-2xl font-black italic tracking-tighter uppercase">ORDER <span class="text-cyan-400">QUEUE</span></h2>
                <button id="closeCart" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i class="fas fa-times"></i></button>
            </div>

            <div id="cartItems" class="flex-grow p-10 overflow-y-auto space-y-6 hide-scrollbar">
                <!-- Cart items injected by JS -->
            </div>

            <div class="p-10 bg-black/40 backdrop-blur-3xl border-t border-white/10">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <span class="text-slate-400 font-bold uppercase tracking-widest text-[10px]">Total Investment</span>
                        <span id="cartTotal" class="block text-4xl font-black text-white">0 LKR</span>
                    </div>
                </div>
                <button id="checkoutBtn" class="w-full py-6 rounded-3xl bg-white text-black font-black text-sm uppercase tracking-[0.25em] transition-all hover:scale-[1.02] active:scale-[0.98] shadow-2xl flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp text-lg"></i>
                    Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <!-- Floating WhatsApp -->
    <div class="fixed bottom-10 right-10 z-[90]">
        <a id="floatWA" href="https://wa.me/94785673989" target="_blank" class="relative flex items-center justify-center w-20 h-20 bg-white/10 backdrop-blur-2xl border border-white/20 rounded-full shadow-2xl hover:-translate-y-2 transition-all">
            <div class="absolute inset-0 bg-cyan-400 rounded-full blur-2xl opacity-40 animate-pulse"></div>
            <i class="fab fa-whatsapp text-3xl text-white"></i>
        </a>
    </div>

    <script>
        const PRODUCTS = [
            { id: 'squad-1', name: '1 SQUAD - Starter Boost', price: 1000, category: 'Automation', sold: 142, icon: 'fa-users', color: 'text-cyan-300', desc: '3 Bots Activated | 100K - 200K Glory. Safe Gradual Delivery.' },
            { id: 'squad-2', name: '2 SQUADS - Pro Boost', price: 1800, category: 'Automation', sold: 288, icon: 'fa-layer-group', color: 'text-blue-400', desc: '6 Bots Activated | 200K - 400K Glory. Faster Boost Delivery.' },
            { id: 'squad-3', name: '3 SQUADS - Elite Push', price: 2500, category: 'Automation', sold: 466, icon: 'fa-trophy', color: 'text-emerald-400', desc: '9 Bots Activated | 400K - 600K Glory. High Rank Push Optimized.' },
            { id: 'likes-30', name: '30 DAYS LIKES - Popularity', price: 3500, category: 'Social', sold: 512, icon: 'fa-heart', color: 'text-red-400', desc: '6,000+ Total Likes | 200+ Daily Likes. Boost profile presence.' },
            { id: 'custom-id', name: 'Liquid Glass Custom ID', price: 4600, category: 'Elite', sold: 89, icon: 'fa-bullseye', color: 'text-purple-400', desc: 'Reflective, personalized account ID with high-gloss HEX styling.' }
        ];

        let cart = [];
        const WHATSAPP_BASE = "https://wa.me/94785673989";

        const grid = document.getElementById('productGrid');
        const cartSidebar = document.getElementById('cartSidebar');
        const cartItemsContainer = document.getElementById('cartItems');
        const cartTotal = document.getElementById('cartTotal');
        const cartCount = document.getElementById('cartCount');
        const searchInput = document.getElementById('searchInput');

        function renderProducts(filter = '') {
            grid.innerHTML = PRODUCTS.filter(p => p.name.toLowerCase().includes(filter.toLowerCase())).map(p => `
                <div class="glass-card rounded-[2.5rem] p-8 flex flex-col relative overflow-hidden group">
                    <div class="absolute top-0 left-0 w-full h-1/2 bg-gradient-to-b from-white/10 to-transparent opacity-50"></div>
                    
                    <div class="flex justify-between items-start mb-8 relative z-10">
                        <div class="product-icon w-16 h-16 rounded-2xl border border-white/10 flex items-center justify-center transition-transform duration-500 group-hover:rotate-6">
                            <i class="fas ${p.icon} text-2xl ${p.color}"></i>
                        </div>
                        <div class="bg-white/5 border border-white/10 px-3 py-1 rounded-full text-[10px] font-black text-slate-400">
                            <i class="fas fa-check-shield text-green-400 mr-1"></i> ${p.sold} Sold
                        </div>
                    </div>

                    <div class="flex-grow relative z-10">
                        <span class="text-[9px] font-black text-cyan-400 uppercase tracking-[0.3em] mb-3 block">${p.category}</span>
                        <h4 class="text-xl font-black text-white mb-3 italic uppercase">${p.name}</h4>
                        <p class="text-slate-400 text-sm leading-relaxed mb-8">${p.desc}</p>
                    </div>

                    <div class="flex items-center justify-between pt-6 border-t border-white/10 relative z-10">
                        <div>
                            <p class="text-[10px] font-black text-slate-500 uppercase mb-1">Price</p>
                            <p class="text-2xl font-black text-white">${p.price.toLocaleString()} <span class="text-xs text-slate-400">LKR</span></p>
                        </div>
                        <button onclick="addToCart('${p.id}')" class="w-12 h-12 rounded-full bg-white/10 hover:bg-white text-white hover:text-black flex items-center justify-center transition-all">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = PRODUCTS.find(p => p.id === id);
            cart.push(product);
            updateCart();
            cartSidebar.classList.add('active');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateCart() {
            cartCount.textContent = cart.length;
            cartCount.classList.toggle('hidden', cart.length === 0);
            
            cartItemsContainer.innerHTML = cart.length === 0 ? 
                `<div class="h-full flex flex-col items-center justify-center opacity-30 text-slate-500">
                    <i class="fas fa-layer-group text-6xl mb-4"></i>
                    <p class="font-black uppercase tracking-widest text-sm">Cart Empty</p>
                </div>` :
                cart.map((item, i) => `
                <div class="flex items-center gap-6 p-6 rounded-3xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all">
                    <div class="w-12 h-12 flex items-center justify-center rounded-xl bg-white/5 text-cyan-400">
                        <i class="fas ${item.icon}"></i>
                    </div>
                    <div class="flex-grow">
                        <h5 class="font-black text-xs uppercase text-white truncate">${item.name}</h5>
                        <p class="text-cyan-400 font-black">${item.price.toLocaleString()} LKR</p>
                    </div>
                    <button onclick="removeFromCart(${i})" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);
            cartTotal.textContent = `${total.toLocaleString()} LKR`;
        }

        document.getElementById('cartBtn').onclick = () => cartSidebar.classList.add('active');
        document.getElementById('closeCart').onclick = () => cartSidebar.classList.remove('active');
        document.getElementById('cartOverlay').onclick = () => cartSidebar.classList.remove('active');
        
        searchInput.oninput = (e) => renderProducts(e.target.value);

        document.getElementById('checkoutBtn').onclick = () => {
            if (cart.length === 0) return;
            const items = cart.map(item => `- ${item.name} (${item.price} LKR)`).join('%0A');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            const message = `Hello THINA STORE, I want to order:%0A${items}%0A%0ATotal: ${total} LKR`;
            window.open(`${WHATSAPP_BASE}?text=${message}`, '_blank');
        };

        renderProducts();
    </script>
</body>
</html>
